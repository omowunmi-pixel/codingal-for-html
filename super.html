<!DOCTYPE html>
<html>
<head>
  <title>My Superhero Card</title>
  <style>

    /* Typography — font, size, weight, colour for the whole page */
    body {
      background-color: rgb(115, 161, 42);
      color: rgb(185, 8, 102)11, 21, 205);
      font-family: Arial, sans-serif;
    }

    /* Typography + Text Shadow — big bold title with an orange shadow */
    .hero-name {
      font-size: 80px;
      font-weight: bold;
      color: yellow;
      text-shadow: 5px 5px orange;
    }

    /* Typography + Text Transform — tagline becomes Title Case */
    .tagline {
      font-style: bold;
      color: rgb(60, 10, 104);
      text-transform: capitalize;
    }

    /* Text Transform + Text Decoration — section headings in CAPS with underline */
    .label {
      text-transform: uppercase;
      text-decoration: underline;
      color: coral;
    }

    /* Typography — powers stand out in bold green */
    .power {
      font-weight: bold;
      color: rgb(117, 25, 93);
    }

    /* Text Decoration — weaknesses are crossed out */
    .weakness {
      text-decoration: line-through;
      color: gray;
    }

    /* Transform — the badge is tilted to the side */
    .badge {
      font-size: 28px;
      font-weight: bold;
      color: gold;
      transform: rotate(15deg);
    }

    /* Typography — footer text */
    .made-by {
      color: rgb(72, 17, 45);
      font-style: bold;
    }

  </style>
</head>
<body>

  <h1 class="hero-name"> APEX</h1>
  <p class="tagline">the most powerful hero in the school</p>

  <h2 class="label">super powers</h2>
  <p class="power">Can run faster than a cheetah</p>
  <p class="power">Can lift a school bus</p>

  <h2 class="label">weaknesses</h2>
  <p class="weakness">inability to protect herself
  </p>
  <p class="weakness">Broccoli</p>

  <p class="badge">Master Fighter</p>

  <p class="made-by">Created by Fathia</p>

</body>
</html>
