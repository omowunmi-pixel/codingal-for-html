<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Colour Card</title>

    <style>
        /* Universal Selector - applies to everything on the page */
        * {
            font-size: 16px;
        }

        /* Element Selectors */
        body {
            background-color: rgb(39, 12, 85);
        }

        h1 {
            color: rgb(98, 82, 4);
        }

        h2 {
            color: rgb(143, 48, 19);
        }

        p {
            color: rgb(167, 151, 8);
        }

        /* Class Selector */
        .my-detail {
            color: rgb(176, 189, 57);
            font-weight: bold;
        }

        /* ID Selector */
        #my-card {
            background-color: rgb(18, 29, 108);
        }
    </style>

</head>

<body>

    <h1>My Colour Card</h1>

    <!-- Inline CSS: Add style="color: ____;" inside this p tag -->
    <p style="color: crimson;">Hi! This is my very own webpage.</p>

    <div id="my-card">

        <h2>About Me</h2>
        <p class="my-detail">My name is Omowunmi.</p>
        <p class="my-detail">My favourite colour is Blue.</p>
        <p class="my-detail">My favourite subject is Maths.</p>
        <p class="my-detail">My favourite food is pasta.</p>

    </div>

    <h2>My Favourite Things</h2>
    <p>My favourite animal is a dog.</p>
    <p>My favourite sport is basketball.</p>
    <p>My favourite movie is Suits.</p>

</body>

</html>
